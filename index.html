<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部活動 教室リアルタイム管理</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #1e3a8a; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .card.occupied { border-top: 6px solid #ef4444; }
        .card.available { border-top: 6px solid #10b981; }
        .room-name { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; color: white; margin-bottom: 15px; }
        .occupied .status-badge { background: #ef4444; }
        .available .status-badge { background: #10b981; }
        .club-name { font-size: 1.1rem; font-weight: bold; min-height: 27px; margin-bottom: 15px; color: #4b5563; }
        .inputs { display: flex; flex-direction: column; gap: 8px; }
        input, button { padding: 8px; border-radius: 6px; border: 1px solid #d1d5db; font-size: 0.95rem; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        button.leave-btn { background: #6b7280; }
        button.leave-btn:hover { background: #4b5563; }
    </style>
</head>
<body>
    <h1>🏫 教室利用状況リアルタイムボードv12</h1>
    <div id="loading" style="text-align: center;">データを読み込み中...</div>
    <div class="grid" id="roomGrid"></div>

    <script>
        // ⚠️ ここにステップ1でコピーしたGASのURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwHXwIq6Axtzz6_78Pc-UvNFq6ox-z77mp16ascH2nZoGyJguLYoOWs7iLKH0etEwbTzQ/exec";

        // データを取得して画面を描画する関数
        async function loadRooms() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                document.getElementById('loading').style.display = 'none';
                const grid = document.getElementById('roomGrid');
                grid.innerHTML = '';

                data.forEach(room => {
                    const isOccupied = room.status === '使用中';
                    const card = document.createElement('div');
                    card.className = `card ${isOccupied ? 'occupied' : 'available'}`;
                    
                    card.innerHTML = `
                        <div class="room-name">${room.room}</div>
                        <div class="status-badge">${room.status}</div>
                        <div class="club-name">${isOccupied ? room.club : 'ーーー'}</div>
                        <div class="inputs">
                            ${isOccupied ? `
                                <button class="leave-btn" onclick="updateRoom(${room.id}, '空き', 'なし')">退室（空きにする）</button>
                            ` : `
                                <input type="text" id="club-${room.id}" placeholder="使用する部活名を入力">
                                <button onclick="enterRoom(${room.id})">入室（使用する）</button>
                            `}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("データ取得エラー:", error);
            }
        }

        // 入室処理
        function enterRoom(id) {
            const clubInput = document.getElementById(`club-${id}`);
            const clubName = clubInput.value.trim();
            if (!clubName) {
                alert("部活名を入力してください。");
                return;
            }
            updateRoom(id, '使用中', clubName);
        }

        // スプレッドシートのデータを更新する関数
        async function updateRoom(id, status, club) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = '更新中...';

            
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id, status, club })
               });
                // 更新完了したら再読み込み
                loadRooms();
            } catch (error) {
                alert("更新に失敗しました。" , error);
                console.error(error);
            }
        }

        // 最初の一回を実行、および30秒ごとに自動リロードしてリアルタイム化
        loadRooms();
        setInterval(loadRooms, 30000); 
    </script>
</body>
</html>
